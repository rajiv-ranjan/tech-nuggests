apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: observability
spec:
  mode: deployment
  # To scrape internal metrics of the OpenTelemetry Collector
  # Depending on the deployment mode of the OpenTelemetry Collector, the internal metrics are scraped by using PodMonitors or ServiceMonitors.
  observability:
    metrics:
      enableMetrics: true
  config:
    # receivers: otlp, jaeger, prometheus, zipkin, kafka
    # There are many receivers. Please refer to the documentation for the complete list. 
    # https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/red_hat_build_of_opentelemetry/index#otlp-receiver_otel-collector-receivers
    receivers: 
      otlp:
        protocols:
          grpc: {}
          http: {}
      # jaeger:
      #   protocols:
      #     grpc: 
      #       endpoint: 0.0.0.0:14250
      #     thrift_binary: 
      #       endpoint: 0.0.0.0:14268 
      #     thrift_compact: 
      #       endpoint: 0.0.0.0:6831 
      #     thrift_http: 
      #       endpoint: 0.0.0.0:6832 
      # zipkin: {}
    
    
    # processors: batch, memory_limiter, resourcedetection, attributes, span, k8sattributes, filter, routing
    # There are many processors. Please refer to the documentation for the complete list.
    # https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/red_hat_build_of_opentelemetry/index#otel-collector-processors
    processors: 
      batch: {}
      memory_limiter:
        check_interval: 120s
        limit_percentage: 50
        spike_limit_percentage: 30
      resourcedetection:
        detectors: [openshift]
    
    # exporters: otlp, otlphttp, debug, prometheus, kafka
    # There are many exporters. Please refer to the documentation for the complete list.
    # https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/red_hat_build_of_opentelemetry/index#otel-collector-exporters
    exporters: 
      debug: 
        verbosity: detailed
      otlp:
        endpoint: 'tempo-sample-distributor.tracing-system.svc.cluster.local:4317'
        tls:
          insecure: true
    
    # connectors: spanmetrics
    # There are many connectors. Please refer to the documentation for the complete list.
    # https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/red_hat_build_of_opentelemetry/index#otel-collector-connectors
    # connectors:
    #   spanmetrics:
    #     metrics_flush_interval: 15s
    
    # extensions: bearertokenauth, oauth2client, jaegerremotesampling, pprof, health_check, memory_ballast, zpages
    # There are many extensions. Please refer to the documentation for the complete list.
    # https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/red_hat_build_of_opentelemetry/index#otel-collector-extensions
    # extensions:
    #   health_check: {}
    #   pprof: {}
    #   zpages: {}
    

    # service: pipelines, telemetry
    service:
      # pipelines create a flow of data from receivers, through processors, to exporters for traces, metrics, and logs
      # pipelines: traces, metrics, logs
      pipelines:
        traces:
          # receivers: [otlp,jaeger,zipkin]
          receivers: [otlp]
          # processors: [memory_limiter,batch]
          processors: [batch,memory_limiter,resourcedetection]
          exporters: [debug,otlp]
        # metrics:
        #   receivers: []
        #   processors: []
        #   exporters: [debug]
        # logs are not covered as part of the official documentation till OCP 4.19
        # logs:
        #   receivers: []
        #   processors: []
        #   exporters: [debug]
      
      telemetry:
        # To get the logs for the OpenTelemetry Collector 
        logs:
          # level: info, warn, error, debug
          level: debug
        # To exposes the metrics about the data volumes it has processed
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888